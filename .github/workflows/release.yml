name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build RuneLite plugin JAR
        run: |
          chmod +x gradlew
          ./gradlew shadowJar

      - name: Rename JAR to release version
        run: mv build/libs/*-all.jar build/libs/osrs-companion-${{ steps.version.outputs.VERSION }}-all.jar

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Build MCP server
        working-directory: mcp-server
        run: npm ci && npm run build

      - name: Package MCP server
        run: zip -r osrs-mcp-server-${{ steps.version.outputs.VERSION }}.zip mcp-server/dist mcp-server/package.json mcp-server/package-lock.json

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/osrs-companion-${{ steps.version.outputs.VERSION }}-all.jar
            osrs-mcp-server-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
